<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>القرآن — Quranic Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5efe4;--bg2:#ede4d3;--surf:#fdfaf3;
  --bdr:#d5c8ae;--bdr2:#c3b491;
  --grn:#1b5c38;--grn2:#26794d;--grn3:#38a06e;--grnlt:#e6f2eb;
  --teal:#165858;--teal2:#1f7070;--tealt:#e0f0f0;
  --gold:#7d5c10;--gold2:#b8901c;--goldlt:#fdf0d0;
  --rust:#7a3015;
  --txt:#2b1d0c;--txt2:#58412a;--mut:#806448;
  --r:14px;
  --shd:0 2px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --shd2:0 6px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Source Serif 4',Georgia,serif;font-size:15px}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:90px}
button{font-family:'Source Serif 4',Georgia,serif}

/* HEADER */
.hdr{padding:18px 18px 0}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--grn)}
.logo-sub{font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--mut);margin-top:1px}
.chips{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--bdr);background:var(--surf);color:var(--txt2);cursor:default;white-space:nowrap}
.chip-fire{background:#fff7ed;border-color:#f4a245;color:#92400e}
.chip-xp{background:var(--grnlt);border-color:var(--grn3);color:var(--grn)}
.chip-badge{background:var(--goldlt);border-color:var(--gold2);color:var(--gold);cursor:pointer}
.xpbar-outer{width:50px;background:var(--bdr);border-radius:10px;height:5px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:3px}
.xpbar-inner{height:100%;background:linear-gradient(90deg,var(--grn),var(--grn3));transition:width .5s}

/* DAILY GOAL */
.goal-wrap{margin:12px 18px 0;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 14px}
.goal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.goal-lbl{font-size:12px;font-weight:600;color:var(--txt2)}
.goal-cnt{font-size:12px;color:var(--mut)}
.gtrack{background:var(--bg2);border-radius:20px;height:7px;overflow:hidden}
.gfill{height:100%;border-radius:20px;transition:width .4s;background:linear-gradient(90deg,var(--grn2),var(--grn3))}
.gfill.done{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.gdone{font-size:11px;color:var(--gold);font-weight:600;margin-top:5px;text-align:center;letter-spacing:.3px}

/* AYAH CARD */
.ayah-card{margin:10px 18px 0;background:linear-gradient(135deg,var(--grn),var(--teal));border-radius:var(--r);padding:13px 16px;color:#fff}
.ayah-ar{font-family:'Amiri',serif;font-size:17px;direction:rtl;line-height:1.7;color:#d1f0dc;text-align:right;margin-bottom:4px}
.ayah-en{font-size:11px;color:rgba(255,255,255,.78);font-style:italic}
.ayah-src{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* TABS */
.tabs{display:flex;gap:7px;padding:12px 18px 0}
.tbtn{flex:1;padding:10px;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);border-radius:var(--r);font-family:'Playfair Display',serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tbtn.on{background:var(--grn);border-color:var(--grn);color:#fff}

/* MODE BAR */
.mbar{display:flex;gap:6px;padding:9px 18px 0;align-items:center}
.mbtn{padding:6px 13px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--mut);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.4px}
.mbtn.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.qbadge{margin-left:auto;font-size:11px;color:var(--mut);display:flex;align-items:center;gap:4px}
.qdot{width:6px;height:6px;border-radius:50%;background:var(--rust)}

/* FILTERS */
.filts{display:flex;gap:5px;padding:7px 18px 0;overflow-x:auto;scrollbar-width:none}
.filts::-webkit-scrollbar{display:none}
.filt{white-space:nowrap;padding:3px 9px;border-radius:14px;border:1px solid var(--bdr);background:transparent;color:var(--mut);font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.4px}
.filt.on{background:var(--goldlt);border-color:var(--gold2);color:var(--gold)}

/* SR STATS */
.srstats{display:flex;gap:7px;margin:9px 18px 0}
.srstat{flex:1;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:7px 8px;text-align:center}
.srnum{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--grn)}
.srlbl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* MAIN */
.main{padding:12px 18px 0}

/* PROGRESS BAR */
.pbwrap{margin-bottom:10px}
.pbtop{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-bottom:4px}
.pbtrack{background:var(--bg2);border-radius:20px;height:5px;overflow:hidden}
.pbfill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--teal),var(--grn3));transition:width .5s}

/* FLASHCARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:28px 24px 22px;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;box-shadow:var(--shd2);transition:box-shadow .2s,transform .15s;position:relative;overflow:hidden;width:100%}
.card:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(0,0,0,.11)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--grn),var(--teal));border-radius:20px 20px 0 0}
.card.mast::before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.card.phrase-card{min-height:270px}
.cbadge{position:absolute;top:14px;right:12px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.5px}
.bnew{background:var(--grnlt);color:var(--grn);border:1px solid var(--grn3)}
.brev{background:var(--tealt);color:var(--teal);border:1px solid var(--teal2)}
.bmast{background:var(--goldlt);color:var(--gold);border:1px solid var(--gold2)}
.cfreq{position:absolute;top:14px;left:12px;font-size:9px;color:var(--mut);background:var(--bg2);border-radius:7px;padding:2px 6px}
.cdiff{position:absolute;top:14px;left:12px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:7px;text-transform:uppercase;letter-spacing:.3px}
.diff-b{background:#dcfce7;color:#166534}
.diff-i{background:#fef9c3;color:#854d0e}
.diff-a{background:#fee2e2;color:#991b1b}
.ccat{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mut);margin-bottom:12px;font-weight:600}
.car{font-family:'Amiri',serif;font-size:clamp(36px,9vw,52px);color:var(--grn);direction:rtl;line-height:1.4;margin-bottom:7px}
.carp{font-family:'Amiri',serif;font-size:clamp(18px,5vw,24px);color:var(--grn);direction:rtl;line-height:1.8;margin-bottom:10px}
.ctr{font-style:italic;color:var(--mut);font-size:13px;margin-bottom:3px;font-weight:300}
.chint{font-size:11px;color:var(--bdr2);margin-top:12px;letter-spacing:.3px}
.cblbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-bottom:9px}
.cen{font-size:clamp(15px,4vw,21px);font-weight:600;color:var(--txt);margin-bottom:6px;line-height:1.4}
.cctx{font-size:12px;color:var(--mut);border-top:1px solid var(--bdr);padding-top:10px;margin-top:10px;line-height:1.6;max-width:340px;font-style:italic}
.cint{font-size:10px;color:var(--teal2);margin-top:8px}
.cseen{font-size:10px;color:var(--mut);margin-top:5px}

/* SR RATING BUTTONS */
.srbr{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:11px}
.srb{padding:9px 5px;border-radius:10px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;line-height:1.2}
.srb .hint{display:block;font-size:9px;font-weight:400;opacity:.7;margin-top:1px;text-transform:uppercase;letter-spacing:.2px}
.again{background:#fee2e2;border-color:#fca5a5;color:#991b1b}.again:hover{background:#fecaca}
.hard{background:#ffedd5;border-color:#fdba74;color:#9a3412}.hard:hover{background:#fed7aa}
.good{background:var(--grnlt);border-color:var(--grn3);color:var(--grn)}.good:hover{background:#bbf7d0}
.easy{background:var(--goldlt);border-color:var(--gold2);color:var(--gold)}.easy:hover{background:#fde68a}

/* FLIP ROW */
.flrow{display:flex;gap:7px;margin-top:11px}
.btn{flex:1;padding:11px;border-radius:var(--r);border:1px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--surf);color:var(--txt2)}
.btn:hover{background:var(--bg2)}
.btn-skip{background:transparent;color:var(--mut);border-color:transparent}
.btn-skip:hover{color:var(--txt2);background:transparent}
.btn-primary{background:var(--grn);color:#fff;border-color:var(--grn)}
.btn-primary:hover{background:var(--grn2)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--mut)}
.empty h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--grn);margin-bottom:8px}

/* QUIZ */
.qhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.qscore-lbl{font-family:'Playfair Display',serif;font-size:20px;color:var(--grn)}
.qprog{font-size:12px;color:var(--mut)}
.qcard{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:26px;text-align:center;margin-bottom:13px;box-shadow:var(--shd)}
.qar{font-family:'Amiri',serif;font-size:clamp(32px,9vw,50px);color:var(--grn);direction:rtl;line-height:1.4;margin-bottom:5px}
.qarp{font-family:'Amiri',serif;font-size:clamp(16px,5vw,21px);color:var(--grn);direction:rtl;line-height:1.8;margin-bottom:5px}
.qtr{font-style:italic;color:var(--mut);font-size:12px}
.qlbl{font-size:12px;color:var(--mut);margin-top:7px}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qopt{padding:12px 9px;border-radius:11px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt2);font-size:11px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4}
.qopt:hover:not(:disabled){border-color:var(--grn2);background:var(--grnlt)}
.qopt.correct{background:#dcfce7;border-color:#4ade80;color:#166534;font-weight:700}
.qopt.wrong{background:#fee2e2;border-color:#f87171;color:#991b1b}
.qopt:disabled{cursor:default}
.qresult{text-align:center;padding:32px 20px}
.remi{font-size:60px;margin-bottom:12px}
.rscore{font-family:'Playfair Display',serif;font-size:48px;color:var(--grn)}
.rmsg{color:var(--mut);font-size:14px;font-style:italic;margin-bottom:22px;margin-top:4px}
.rbr{display:flex;gap:8px;justify-content:center}

/* BADGES OVERLAY */
.bov{position:fixed;inset:0;background:rgba(20,12,4,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.bsheet{background:var(--surf);border-radius:22px 22px 0 0;padding:22px 18px 38px;width:100%;max-width:520px;max-height:75vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.btitle{font-family:'Playfair Display',serif;font-size:21px;color:var(--grn);text-align:center;margin-bottom:16px}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.bitem{display:flex;gap:9px;align-items:center;padding:11px;background:var(--bg);border:1px solid var(--bdr);border-radius:11px;transition:all .2s}
.bitem.earn{border-color:var(--gold2);background:var(--goldlt)}
.bicon{font-size:22px;flex-shrink:0}
.bname{font-size:11px;font-weight:700;color:var(--txt2)}
.bdesc{font-size:10px;color:var(--mut);margin-top:1px}
.bitem:not(.earn){opacity:.38}

/* FAB */
.fab{position:fixed;bottom:22px;right:18px;width:46px;height:46px;border-radius:50%;background:var(--goldlt);border:1px solid var(--gold2);color:var(--gold);font-size:20px;cursor:pointer;box-shadow:var(--shd2);transition:transform .2s;z-index:100;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1)}

/* NOTIFICATION */
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:999;padding:9px 18px;border-radius:28px;font-size:13px;font-weight:600;box-shadow:var(--shd2);animation:sli .25s ease;white-space:nowrap;pointer-events:none}
.notif.ok{background:var(--surf);border:1px solid var(--grn3);color:var(--grn)}
.notif.gold{background:var(--goldlt);border:1px solid var(--gold2);color:var(--gold)}
.notif.warn{background:#fff7ed;border:1px solid #fdba74;color:#9a3412}
@keyframes sli{from{opacity:0;transform:translateX(-50%) translateY(-9px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:380px){
  .qopts{grid-template-columns:1fr}
  .bgrid{grid-template-columns:1fr}
  .srbr{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="notif-container"></div>
<button class="fab" id="fab-badges">🏆</button>

  {id:47,ar:"رَبَّنَا إِنَّنَا آمَنَّا فَاغْفِرْ لَنَا ذُنُوبَنَا",tr:"Rabbanā innanā āmannā faghfir lanā dhunūbanā",en:"Our Lord, indeed we have believed, so forgive us our sins",ctx:"Al-Imran 3:16",cat:"Supplications",diff:"i"},
  {id:48,ar:"رَبَّنَا لَا تُؤَاخِذْنَا إِن نَّسِينَا أَوْ أَخْطَأْنَا",tr:"Rabbanā lā tuʾākhidhnā in nasīnā aw akhṭaʾnā",en:"Our Lord, do not impose blame upon us if we forget or err",ctx:"Al-Baqarah 2:286",cat:"Supplications",diff:"i"},
  {id:49,ar:"وَلَسَوْفَ يُعْطِيكَ رَبُّكَ فَتَرْضَى",tr:"Wa-la-sawfa yuʿṭīka rabbuka fa-tarḍā",en:"And your Lord is going to give you, and you will be satisfied",ctx:"Ad-Duha 93:5",cat:"Key Verses",diff:"i"},
  {id:50,ar:"رَبَّنَا هَبْ لَنَا مِنْ أَزْوَاجِنَا وَذُرِّيَّاتِنَا قُرَّةَ أَعْيُنٍ",tr:"Rabbanā hab lanā min azwājinā wa-dhurriyyātinā qurrata aʿyun",en:"Our Lord, grant us from our spouses and offspring comfort to our eyes",ctx:"Al-Furqan 25:74 — dua for a righteous family",cat:"Supplications",diff:"a"},
];

const BADGES = [
  {id:"first",icon:"🌱",title:"First Step",desc:"Review your first card",check:s=>s.total>=1},
  {id:"goal",icon:"⭐",title:"Daily Goal",desc:"Complete 15 cards in one day",check:s=>s.best>=15},
  {id:"s3",icon:"🔥",title:"Ignited",desc:"3-day streak",check:s=>s.streak>=3},
  {id:"s7",icon:"🌙",title:"Weekly Devotion",desc:"7-day streak",check:s=>s.streak>=7},
  {id:"s30",icon:"🕌",title:"Monthly Commitment",desc:"30-day streak",check:s=>s.streak>=30},
  {id:"m10",icon:"📖",title:"Seeker",desc:"Master 10 cards",check:s=>s.mastered>=10},
  {id:"m50",icon:"✨",title:"Scholar",desc:"Master 50 cards",check:s=>s.mastered>=50},
  {id:"m100",icon:"💎",title:"Hafiz Path",desc:"Master 100 cards",check:s=>s.mastered>=100},
  {id:"w25",icon:"🌿",title:"Vocabulary Grower",desc:"Review 25 word cards",check:s=>s.wrev>=25},
  {id:"p10",icon:"📜",title:"Reciter",desc:"Review 10 phrase cards",check:s=>s.prev>=10},
];

const DIFF_LABEL = {b:"Beginner",i:"Intermediate",a:"Advanced"};
const DIFF_CLS = {b:"diff-b",i:"diff-i",a:"diff-a"};
const GOAL = 15;
const TODAY = ()=>new Date().toDateString();

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  tab:"words", cat:"All", mode:"study", flipped:false,
  curKey:null, cardData:{},
  stats:{streak:0,lastDate:null,total:0,mastered:0,wrev:0,prev:0,best:0,xp:0,dailyCount:0,dailyDate:TODAY()},
  quiz:null,
};

function save(){try{localStorage.setItem("qapp",JSON.stringify({cardData:state.cardData,stats:state.stats}))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem("qapp")||"{}");if(d.cardData)state.cardData=d.cardData;if(d.stats)state.stats={...state.stats,...d.stats}}catch(e){}}
load();

// ─── SM-2 ────────────────────────────────────────────────────────────────────
function sm2(card,q){
  let {reps=0,ef=2.5,interval=0,totalSeen=0}=card||{};
  totalSeen++;
  if(q<3){reps=0;interval=1;}
  else{
    if(reps===0)interval=1;
    else if(reps===1)interval=6;
    else interval=Math.round(interval*ef);
    reps++;
  }
  ef=Math.max(1.3,ef+0.1-(5-q)*(0.08+(5-q)*0.02));
  const d=new Date();d.setDate(d.getDate()+interval);
  return{reps,ef,interval,nextDue:d.toDateString(),mastered:reps>=5&&interval>=21,totalSeen};
}
function isDue(cd){return!cd?.nextDue||new Date(cd.nextDue)<=new Date();}
function ikey(tab,id){return `${tab[0]}-${id}`;}

// ─── QUEUE ───────────────────────────────────────────────────────────────────
function getQueue(){
  const items=getFiltered();
  const due=[],fresh=[];
  for(const it of items){
    const cd=state.cardData[ikey(state.tab,it.id)];
    if(!cd?.nextDue)fresh.push(it);
    else if(isDue(cd)&&!cd.mastered)due.push(it);
  }
  due.sort((a,b)=>new Date(state.cardData[ikey(state.tab,a.id)]?.nextDue)-new Date(state.cardData[ikey(state.tab,b.id)]?.nextDue));
  return[...due,...fresh];
}
function getFiltered(){
  const items=state.tab==="words"?WORDS:PHRASES;
  return state.cat==="All"?items:items.filter(i=>i.cat===state.cat);
}
function getCats(){
  const items=state.tab==="words"?WORDS:PHRASES;
  return["All",...new Set(items.map(i=>i.cat))];
}
function getMastCount(){return Object.values(state.cardData).filter(c=>c.mastered).length;}
function getDailyCount(){return state.stats.dailyDate===TODAY()?state.stats.dailyCount:0;}

// ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
function notify(msg,type="ok"){
  const c=document.getElementById("notif-container");
  const el=document.createElement("div");
  el.className=`notif ${type}`;el.textContent=msg;
  c.innerHTML="";c.appendChild(el);
  setTimeout(()=>{el.remove();},2800);
}

// ─── REVIEW ──────────────────────────────────────────────────────────────────
function review(q){
  const queue=getQueue();
  if(!queue.length)return;
  const cur=queue.find(i=>ikey(state.tab,i.id)===state.curKey)||queue[0];
  if(!cur)return;
  const key=ikey(state.tab,cur.id);
  const prev=state.cardData[key]||{};
  const next=sm2(prev,q);
  const gainedMastery=next.mastered&&!prev.mastered;
  state.cardData[key]=next;

  const xpMap={0:5,1:10,3:15,5:20};
  const s=state.stats;
  const isToday=s.dailyDate===TODAY();
  const newDaily=(isToday?s.dailyCount:0)+1;
  const yd=new Date();yd.setDate(yd.getDate()-1);
  const newStreak=s.lastDate===TODAY()?s.streak:(s.lastDate===yd.toDateString()?s.streak+1:1);

  state.stats={
    ...s,
    xp:s.xp+(xpMap[q]||10),
    total:s.total+1,
    mastered:getMastCount()+(gainedMastery?1:0),
    wrev:s.wrev+(state.tab==="words"?1:0),
    prev:s.prev+(state.tab==="phrases"?1:0),
    dailyCount:newDaily,dailyDate:TODAY(),
    best:Math.max(s.best,newDaily),
    streak:newStreak,lastDate:TODAY(),
  };
  save();

  if(newDaily===GOAL)setTimeout(()=>notify("🎉 Daily goal reached! Allahu Akbar!","gold"),100);
  if(gainedMastery)setTimeout(()=>notify("⭐ Card Mastered!","gold"),200);

  // advance
  const idx=queue.findIndex(i=>ikey(state.tab,i.id)===state.curKey);
  const nextQueue=getQueue();
  state.flipped=false;
  if(nextQueue.length>0){
    const nextItem=nextQueue[(idx+1)%nextQueue.length]||nextQueue[0];
    state.curKey=ikey(state.tab,nextItem.id);
  }else{state.curKey=null;}
  render();
}

// ─── QUIZ ────────────────────────────────────────────────────────────────────
function startQuiz(){
  const pool=getFiltered();
  if(pool.length<4){notify("Need 4+ items for a quiz","warn");return;}
  const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(10,pool.length));
  const questions=shuffled.map(item=>{
    const wrong=pool.filter(w=>w.id!==item.id).sort(()=>Math.random()-.5).slice(0,3);
    return{item,opts:[...wrong,item].sort(()=>Math.random()-.5),correct:item.id};
  });
  state.quiz={questions,idx:0,score:0,ans:null,done:false};
  state.mode="quiz";
  render();
}

function answerQuiz(optId){
  if(!state.quiz||state.quiz.ans!==null)return;
  const ok=optId===state.quiz.questions[state.quiz.idx].correct;
  if(ok){state.stats.xp+=15;state.stats.total+=1;}
  state.quiz={...state.quiz,ans:optId,score:ok?state.quiz.score+1:state.quiz.score};
  render();
  setTimeout(()=>{
    if(!state.quiz)return;
    if(state.quiz.idx+1>=state.quiz.questions.length){state.quiz={...state.quiz,done:true};}
    else{state.quiz={...state.quiz,idx:state.quiz.idx+1,ans:null};}
    save();render();
  },1100);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  const queue=getQueue();
  const mastCount=getMastCount();
  const dailyCount=getDailyCount();
  const level=Math.floor(state.stats.xp/500)+1;
  const xpPct=((state.stats.xp%500)/500)*100;
  const filtered=getFiltered();
  const earnedBadges=BADGES.filter(b=>b.check({...state.stats,mastered:mastCount}));

  // ensure curKey is valid
  if(!state.curKey&&queue.length>0)state.curKey=ikey(state.tab,queue[0].id);
  const cur=queue.find(i=>ikey(state.tab,i.id)===state.curKey)||queue[0];
  const curCD=cur?(state.cardData[ikey(state.tab,cur.id)]||{}):null;
  const isNew=!curCD?.nextDue;
  const isMast=curCD?.mastered;

  const cats=getCats();

  // Good/Easy interval hints
  const ef=curCD?.ef||2.5;
  const intv=curCD?.interval||1;
  const goodHint=`~${Math.max(1,Math.round(intv*ef))}d`;
  const easyHint=`~${Math.max(1,Math.round(intv*ef*1.3))}d`;

  app.innerHTML=`
    <div class="hdr">
      <div class="hdr-row">
        <div>
          <div class="logo">القرآن</div>
          <div class="logo-sub">Quranic Vocabulary</div>
        </div>
        <div class="chips">
          <div class="chip chip-fire">🔥 ${state.stats.streak}-day</div>
          <div class="chip chip-xp">⭐ Lv${level} <span class="xpbar-outer"><span class="xpbar-inner" style="width:${xpPct}%"></span></span></div>
          <div class="chip chip-badge" id="open-badges">🏆 ${earnedBadges.length}/${BADGES.length}</div>
        </div>
      </div>
    </div>

    <div class="goal-wrap">
      <div class="goal-top">
        <span class="goal-lbl">📖 Daily Goal — 15 cards minimum</span>
        <span class="goal-cnt">${dailyCount}/${GOAL}</span>
      </div>
      <div class="gtrack"><div class="gfill${dailyCount>=GOAL?" done":""}" style="width:${Math.min(100,(dailyCount/GOAL)*100)}%"></div></div>
      ${dailyCount>=GOAL?'<div class="gdone">✨ Goal achieved! Masha\'Allah! ✨</div>':""}
    </div>

    <div class="ayah-card">
      <div class="ayah-ar">وَاعْبُدْ رَبَّكَ حَتَّىٰ يَأْتِيَكَ الْيَقِينُ</div>
      <div class="ayah-en">"And worship your Lord until certainty (death) comes to you"</div>
      <div class="ayah-src">Al-Hijr 15:99</div>
    </div>

    <div class="tabs">
      <button class="tbtn${state.tab==="words"?" on":""}" id="tab-words">📖 Words (${WORDS.length})</button>
      <button class="tbtn${state.tab==="phrases"?" on":""}" id="tab-phrases">📜 Phrases (${PHRASES.length})</button>
    </div>

    <div class="mbar">
      <button class="mbtn${state.mode==="study"?" on":""}" id="mode-study">Study</button>
      <button class="mbtn" id="mode-quiz">Quiz</button>
      <div class="qbadge"><div class="qdot"></div>${queue.length} due</div>
    </div>

    <div class="filts">
      ${cats.map(c=>`<button class="filt${state.cat===c?" on":""}" data-cat="${c}">${c}</button>`).join("")}
    </div>

    <div class="srstats">
      <div class="srstat"><div class="srnum">${queue.length}</div><div class="srlbl">Due Now</div></div>
      <div class="srstat"><div class="srnum">${mastCount}</div><div class="srlbl">Mastered</div></div>
      <div class="srstat"><div class="srnum">${state.stats.total}</div><div class="srlbl">Reviewed</div></div>
    </div>

    <div class="main">${renderMain(cur,curCD,isNew,isMast,filtered,mastCount,goodHint,easyHint)}</div>
  `;
  attachEvents();
}

function renderMain(cur,curCD,isNew,isMast,filtered,mastCount,goodHint,easyHint){
  if(state.mode==="quiz")return renderQuiz();

  if(!cur)return`<div class="empty"><h3>All Caught Up 🌿</h3><p>No cards due right now. Come back tomorrow for your scheduled reviews.</p></div>`;

  const isPhrase=state.tab==="phrases";
  const mastPct=Math.round(mastCount/Math.max(1,filtered.length)*100);

  let diffTag="";
  if(isPhrase){
    const dc=DIFF_CLS[cur.diff]||"diff-b";
    diffTag=`<div class="cdiff ${dc}">${DIFF_LABEL[cur.diff]||""}</div>`;
  }
  let freqTag=(!isPhrase&&cur.freq)?`<div class="cfreq">×${cur.freq}</div>`:"";
  let badge=isNew?`<div class="cbadge bnew">New</div>`:isMast?`<div class="cbadge bmast">⭐ Mastered</div>`:`<div class="cbadge brev">Review</div>`;

  let cardInner="";
  if(!state.flipped){
    const seen=curCD?.totalSeen>0?`<div class="cseen">Seen ${curCD.totalSeen}× · interval ${curCD.interval||1}d</div>`:"";
    const ar=isPhrase?`<div class="carp">${cur.ar}</div>`:`<div class="car">${cur.ar}</div>`;
    cardInner=`<div class="ccat">${cur.cat}</div>${ar}<div class="ctr">${cur.tr}</div>${seen}<div class="chint">tap to reveal meaning</div>`;
  }else{
    const ctx=isPhrase&&cur.ctx?`<div class="cctx">${cur.ctx}</div>`:"";
    const intLine=!isNew?`<div class="cint">Current interval: ${curCD?.interval||1}d</div>`:"";
    cardInner=`<div class="cblbl">Meaning</div><div class="cen">${cur.en}</div><div class="ctr">${cur.tr}</div>${ctx}${intLine}`;
  }

  const buttons=!state.flipped
    ?`<div class="flrow"><button class="btn" id="btn-reveal">Reveal Meaning</button><button class="btn btn-skip" id="btn-skip">Skip</button></div>`
    :`<div class="srbr">
        <button class="srb again" data-q="0">Again<span>&lt;1d</span></button>
        <button class="srb hard" data-q="1">Hard<span>~1d</span></button>
        <button class="srb good" data-q="3">Good<span>${goodHint}</span></button>
        <button class="srb easy" data-q="5">Easy<span>${easyHint}</span></button>
      </div>`;

  return`
    <div class="pbwrap">
      <div class="pbtop"><span>Mastered: ${mastCount}/${filtered.length}</span><span>${mastPct}%</span></div>
      <div class="pbtrack"><div class="pbfill" style="width:${mastPct}%"></div></div>
    </div>
    <div class="card${isPhrase?" phrase-card":""}${isMast?" mast":""}" id="main-card">
      ${badge}${freqTag}${diffTag}${cardInner}
    </div>
    ${buttons}
  `;
}

function renderQuiz(){
  const q=state.quiz;
  if(!q)return"";
  if(q.done){
    const pct=q.score/q.questions.length;
    const emoji=pct===1?"🏆":pct>=0.7?"🌟":"📖";
    const msg=pct===1?"Perfect! Masha'Allah!":pct>=0.7?"Excellent — keep going!":"Keep practicing, you're growing!";
    return`<div class="qresult">
      <div class="remi">${emoji}</div>
      <div class="rscore">${q.score}/${q.questions.length}</div>
      <div class="rmsg">${msg}</div>
      <div class="rbr">
        <button class="btn btn-primary" id="quiz-again">Try Again</button>
        <button class="btn" id="quiz-back">Back to Study</button>
      </div>
    </div>`;
  }
  const cur=q.questions[q.idx];
  const isPhrase=state.tab==="phrases";
  const opts=cur.opts.map(opt=>{
    let cls="qopt";
    if(q.ans!==null){
      if(opt.id===cur.correct)cls+=" correct";
      else if(opt.id===q.ans)cls+=" wrong";
    }
    const label=opt.en.length>55?opt.en.substring(0,55)+"…":opt.en;
    return`<button class="${cls}" data-oid="${opt.id}"${q.ans!==null?" disabled":""}>${label}</button>`;
  }).join("");
  const ar=isPhrase?`<div class="qarp">${cur.item.ar}</div>`:`<div class="qar">${cur.item.ar}</div>`;
  return`
    <div class="qhdr">
      <div class="qscore-lbl">⭐ ${q.score}/${q.questions.length}</div>
      <div class="qprog">Q${q.idx+1} of ${q.questions.length}</div>
    </div>
    <div class="qcard">${ar}<div class="qtr">${cur.item.tr}</div><div class="qlbl">What does this mean?</div></div>
    <div class="qopts">${opts}</div>
  `;
}

function renderBadges(){
  const mastCount=getMastCount();
  const items=BADGES.map(b=>{
    const ok=b.check({...state.stats,mastered:mastCount});
    return`<div class="bitem${ok?" earn":""}"><div class="bicon">${b.icon}</div><div><div class="bname">${b.title}</div><div class="bdesc">${b.desc}</div></div></div>`;
  }).join("");
  const ov=document.createElement("div");
  ov.className="bov";ov.id="badges-overlay";
  ov.innerHTML=`<div class="bsheet"><div class="btitle">🏆 Achievements</div><div class="bgrid">${items}</div><button class="btn" id="close-badges" style="width:100%;margin-top:14px">Close</button></div>`;
  document.body.appendChild(ov);
  ov.querySelector("#close-badges").onclick=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

// ─── EVENT WIRING ─────────────────────────────────────────────────────────────
function attachEvents(){
  const $=id=>document.getElementById(id);

  $("tab-words")?.addEventListener("click",()=>{state.tab="words";state.cat="All";state.mode="study";state.flipped=false;state.curKey=null;render();});
  $("tab-phrases")?.addEventListener("click",()=>{state.tab="phrases";state.cat="All";state.mode="study";state.flipped=false;state.curKey=null;render();});
  $("mode-study")?.addEventListener("click",()=>{state.mode="study";state.flipped=false;render();});
  $("mode-quiz")?.addEventListener("click",startQuiz);
  $("open-badges")?.addEventListener("click",renderBadges);
  $("btn-reveal")?.addEventListener("click",()=>{state.flipped=true;render();});
  $("btn-skip")?.addEventListener("click",()=>{
    const queue=getQueue();
    const idx=queue.findIndex(i=>ikey(state.tab,i.id)===state.curKey);
    if(queue.length>0){const next=queue[(idx+1)%queue.length];state.curKey=ikey(state.tab,next.id);}
    state.flipped=false;render();
  });
  $("main-card")?.addEventListener("click",e=>{
    if(!state.flipped&&!e.target.closest("button")){state.flipped=true;render();}
  });

  document.querySelectorAll("[data-q]").forEach(btn=>{
    btn.addEventListener("click",()=>review(parseInt(btn.dataset.q)));
  });
  document.querySelectorAll("[data-cat]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.cat=btn.dataset.cat;state.curKey=null;state.flipped=false;render();});
  });
  document.querySelectorAll("[data-oid]").forEach(btn=>{
    btn.addEventListener("click",()=>answerQuiz(parseInt(btn.dataset.oid)));
  });
  $("quiz-again")?.addEventListener("click",startQuiz);
  $("quiz-back")?.addEventListener("click",()=>{state.mode="study";state.quiz=null;render();});
}

document.getElementById("fab-badges").addEventListener("click",renderBadges);
render();
</script>
